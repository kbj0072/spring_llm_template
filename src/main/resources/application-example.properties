spring.application.name=llm

# 접근 비밀번호 SHA-256 해시값
chat.access.password-sha256=YOUR_HASHED_PASSWORD_HERE
chat.access.login.max-attempts-per-minute=5

# LLM 서버 설정
# 실제 값은 application.properties 파일에 작성하세요 (git에 추적되지 않음)
llm.api.base-url=http://your-llm-server-url
llm.api.key=YOUR_API_KEY
llm.api.model=your-model-name
