<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - LLM Chat</title>
    <style>
      :root {
        --bg-start: #f3f6ff;
        --bg-end: #e8f0fe;
        --card-bg: #ffffff;
        --primary: #1a73e8;
        --primary-dark: #1557b0;
        --text: #1f2937;
        --muted: #6b7280;
        --danger-bg: #fde8e8;
        --danger-text: #b91c1c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(150deg, var(--bg-start), var(--bg-end));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--card-bg);
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(33, 67, 138, 0.14);
        padding: 28px 22px;
      }

      .title {
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 10px;
      }

      .description {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 18px;
      }

      .error {
        margin-bottom: 14px;
        background: var(--danger-bg);
        color: var(--danger-text);
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
      }

      .input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input:focus {
        border-color: var(--primary);
      }

      .submit-btn {
        margin-top: 12px;
        width: 100%;
        border: none;
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 12px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .submit-btn:hover {
        background: var(--primary-dark);
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
        }

        .login-card {
          border-radius: 14px;
          padding: 22px 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1 class="title">접근 비밀번호</h1>
      <p class="description">
        허용된 사용자만 채팅 페이지를 이용할 수 있습니다.
      </p>

      <div class="error" th:if="${error}" th:text="${error}"></div>

      <form method="post" action="/login">
        <input
          class="input"
          type="password"
          name="password"
          placeholder="비밀번호를 입력하세요"
          autocomplete="current-password"
          required
          autofocus
        />
        <button class="submit-btn" type="submit">입장하기</button>
      </form>
    </main>
  </body>
</html>
