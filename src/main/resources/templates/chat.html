<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Chat</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .chat-container {
        width: 100%;
        max-width: 800px;
        height: 100vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      .chat-header {
        background: #1a73e8;
        color: #fff;
        padding: 16px 20px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }

      /* 사용자 메시지 — 오른쪽 */
      .message-row.user {
        flex-direction: row-reverse;
      }

      .message-bubble {
        max-width: 65%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message-row.user .message-bubble {
        background: #1a73e8;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message-row.assistant .message-bubble {
        background: #f1f3f4;
        color: #202124;
        border-bottom-left-radius: 4px;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .message-row.user .avatar {
        background: #d2e3fc;
        color: #1a73e8;
      }

      .message-row.assistant .avatar {
        background: #e8f5e9;
        color: #2e7d32;
      }

      /* 로딩 인디케이터 */
      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: #f1f3f4;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        width: fit-content;
      }

      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #9aa0a6;
        border-radius: 50%;
        animation: bounce 1.2s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-6px);
        }
      }

      .chat-footer {
        padding: 16px;
        border-top: 1px solid #e0e0e0;
        background: #fff;
        display: flex;
        gap: 10px;
      }

      #user-input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid #dadce0;
        border-radius: 24px;
        font-size: 15px;
        outline: none;
        resize: none;
        max-height: 120px;
        overflow-y: auto;
        font-family: inherit;
        line-height: 1.5;
        transition: border-color 0.2s;
      }

      #user-input:focus {
        border-color: #1a73e8;
      }

      #send-btn {
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      #send-btn:hover:not(:disabled) {
        background: #1557b0;
      }

      #send-btn:disabled {
        background: #c5cae9;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">🤖 LLM Chat</div>

      <div class="chat-messages" id="chat-messages">
        <!-- 메시지가 여기에 추가됩니다 -->
      </div>

      <div class="chat-footer">
        <textarea
          id="user-input"
          rows="1"
          placeholder="메시지를 입력하세요..."
        ></textarea>
        <button id="send-btn" title="전송">
          <!-- send icon -->
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("chat-messages");
      const inputEl = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");

      // 클라이언트 측 대화 히스토리
      const history = [];

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendMessage(role, text) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "U" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        row.appendChild(avatar);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        const row = document.createElement("div");
        row.className = "message-row assistant";
        row.id = "typing-row";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "AI";

        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = "<span></span><span></span><span></span>";

        row.appendChild(avatar);
        row.appendChild(indicator);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function hideTyping() {
        const row = document.getElementById("typing-row");
        if (row) row.remove();
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        // 사용자 메시지 UI 추가 및 히스토리 기록
        appendMessage("user", text);
        history.push({ role: "user", content: text });
        inputEl.value = "";
        inputEl.style.height = "auto";

        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });

          if (!res.ok) {
            throw new Error(`서버 오류: ${res.status}`);
          }

          const data = await res.json();
          const reply = data.content || "응답을 받지 못했습니다.";

          // AI 응답 히스토리 기록 및 UI 추가
          history.push({ role: "assistant", content: reply });
          hideTyping();
          appendMessage("assistant", reply);
        } catch (err) {
          hideTyping();
          appendMessage("assistant", `오류가 발생했습니다: ${err.message}`);
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      // 전송 버튼 클릭
      sendBtn.addEventListener("click", sendMessage);

      // Enter 키 전송 (Shift+Enter는 줄바꿈)
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // textarea 자동 높이 조절
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });
    </script>
  </body>
</html>
