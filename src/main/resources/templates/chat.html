<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Chat</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: stretch;
        overflow: hidden;
      }

      .chat-container {
        width: 100%;
        max-width: 800px;
        height: 100vh;
        height: 100dvh;
        background: #fff;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      .chat-header {
        background: #1a73e8;
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .chat-title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .logout-btn {
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: transparent;
        color: #fff;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }

      /* 사용자 메시지 — 오른쪽 */
      .message-row.user {
        flex-direction: row-reverse;
      }

      .message-bubble {
        max-width: 65%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.5;
        word-break: break-word;
      }

      /* 사용자 메시지는 입력 그대로 개행 유지 */
      .message-row.user .message-bubble {
        white-space: pre-wrap;
      }

      .message-row.user .message-bubble {
        background: #1a73e8;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message-row.assistant .message-bubble {
        background: #f1f3f4;
        color: #202124;
        border-bottom-left-radius: 4px;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .message-row.user .avatar {
        background: #d2e3fc;
        color: #1a73e8;
      }

      .message-row.assistant .avatar {
        background: #e8f5e9;
        color: #2e7d32;
      }

      /* 로딩 인디케이터 */
      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: #f1f3f4;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        width: fit-content;
      }

      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #9aa0a6;
        border-radius: 50%;
        animation: bounce 1.2s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-6px);
        }
      }

      .chat-footer {
        padding: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        border-top: 1px solid #e0e0e0;
        background: #fff;
        display: flex;
        gap: 10px;
      }

      @media (min-width: 801px) {
        body {
          padding: 16px;
        }

        .chat-container {
          height: min(100dvh - 32px, 960px);
          border-radius: 12px;
          overflow: hidden;
        }
      }

      #user-input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid #dadce0;
        border-radius: 24px;
        font-size: 15px;
        outline: none;
        resize: none;
        max-height: 120px;
        overflow-y: auto;
        font-family: inherit;
        line-height: 1.5;
        transition: border-color 0.2s;
      }

      #user-input:focus {
        border-color: #1a73e8;
      }

      #send-btn {
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      #send-btn:hover:not(:disabled) {
        background: #1557b0;
      }

      #send-btn:disabled {
        background: #c5cae9;
        cursor: not-allowed;
      }

      /* ── 마크다운 렌더링 ── */
      .md-body {
        font-size: 15px;
        line-height: 1.65;
        color: #202124;
        white-space: normal; /* pre-wrap 상속 차단 */
      }
      .md-body p {
        margin: 0 0 8px;
      }
      .md-body p:last-child {
        margin-bottom: 0;
      }
      .md-body h1,
      .md-body h2,
      .md-body h3,
      .md-body h4,
      .md-body h5,
      .md-body h6 {
        margin: 14px 0 6px;
        font-weight: 700;
        line-height: 1.3;
      }
      .md-body h1 {
        font-size: 1.35em;
      }
      .md-body h2 {
        font-size: 1.2em;
      }
      .md-body h3 {
        font-size: 1.08em;
      }
      .md-body ul,
      .md-body ol {
        margin: 4px 0 8px 20px;
        padding: 0;
      }
      .md-body li {
        margin-bottom: 2px;
      }
      .md-body code {
        background: #f1f3f4;
        border-radius: 4px;
        padding: 1px 5px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.88em;
      }
      .md-body pre {
        background: #f1f3f4;
        border-radius: 8px;
        padding: 12px 14px;
        overflow-x: auto;
        margin: 8px 0;
      }
      .md-body pre code {
        background: none;
        padding: 0;
        font-size: 0.85em;
      }
      .md-body blockquote {
        border-left: 3px solid #dadce0;
        margin: 8px 0;
        padding: 4px 12px;
        color: #5f6368;
      }
      .md-body hr {
        border: none;
        border-top: 1px solid #dadce0;
        margin: 12px 0;
      }
      .md-body table {
        border-collapse: collapse;
        width: 100%;
        margin: 8px 0;
        font-size: 0.93em;
      }
      .md-body th,
      .md-body td {
        border: 1px solid #dadce0;
        padding: 6px 10px;
        text-align: left;
      }
      .md-body th {
        background: #f1f3f4;
        font-weight: 600;
      }
      .md-body a {
        color: #1a73e8;
        text-decoration: underline;
      }
      /* assistant 버블 위에서 code 배경 조정 */
      .message-row.assistant .md-body code {
        background: #e8eaed;
      }
      .message-row.assistant .md-body pre {
        background: #e8eaed;
      }

      /* ── 첨부 버튼 ── */
      #attach-btn {
        background: transparent;
        color: #9aa0a6;
        border: none;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: color 0.2s;
        padding: 0;
      }

      #attach-btn:hover {
        color: #1a73e8;
      }

      #attach-btn.has-file {
        color: #1a73e8;
      }

      /* ── 첨부 미리보기 띠 ── */
      .attachment-preview {
        padding: 8px 16px;
        gap: 8px;
        align-items: center;
        overflow-x: auto;
        background: #f8f9fa;
        border-top: 1px solid #e0e0e0;
        flex-shrink: 0;
      }

      .attachment-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border: 1px solid #dadce0;
        border-radius: 10px;
        padding: 5px 8px 5px 6px;
        max-width: 220px;
      }

      .attachment-thumb {
        width: 36px;
        height: 36px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .attachment-file-icon {
        font-size: 22px;
        flex-shrink: 0;
      }

      .attachment-name {
        font-size: 12px;
        color: #3c4043;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .attachment-remove {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #9aa0a6;
        padding: 0;
        line-height: 1;
        flex-shrink: 0;
      }

      .attachment-remove:hover {
        color: #d93025;
      }

      /* ── 메시지 내 이미지 ── */
      .message-bubble .msg-image {
        max-width: 100%;
        max-height: 280px;
        border-radius: 10px;
        display: block;
        margin-top: 6px;
      }

      .message-bubble .msg-text {
        margin: 0;
      }

      /* ── 드래그 오버 ── */
      .chat-container.drag-over {
        outline: 3px dashed #1a73e8;
        outline-offset: -4px;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-title">🤖 LLM Chat</div>
        <form method="post" action="/logout">
          <button class="logout-btn" type="submit">로그아웃</button>
        </form>
      </div>

      <div class="chat-messages" id="chat-messages">
        <!-- 메시지가 여기에 추가됩니다 -->
      </div>

      <div
        id="attachment-preview"
        class="attachment-preview"
        style="display: none"
      ></div>

      <div class="chat-footer">
        <input
          type="file"
          id="file-input"
          accept="image/*,.pdf,.txt,.md,.csv,.json,.xml,.log,.py,.js,.ts,.java,.html,.css"
          style="display: none"
        />
        <button id="attach-btn" type="button" title="파일 첨부">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
            />
          </svg>
        </button>
        <textarea
          id="user-input"
          rows="1"
          placeholder="메시지를 입력하세요..."
        ></textarea>
        <button id="send-btn" title="전송">
          <!-- send icon -->
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("chat-messages");
      const inputEl = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const attachBtn = document.getElementById("attach-btn");
      const fileInput = document.getElementById("file-input");
      const attachmentPreview = document.getElementById("attachment-preview");

      const history = [];
      let pendingAttachment = null;
      const FILE_SIZE_LIMIT = 5 * 1024 * 1024; // 5 MB

      // ── 첨부 파일 처리 ────────────────────────────────────────

      attachBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) handleFileSelect(file);
      });

      // 클립보드 붙여넣기 (이미지)
      inputEl.addEventListener("paste", (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith("image/")) {
            e.preventDefault();
            handleFileSelect(item.getAsFile());
            break;
          }
        }
      });

      // 드래그 앤 드롭
      const chatContainer = document.querySelector(".chat-container");
      chatContainer.addEventListener("dragover", (e) => {
        e.preventDefault();
        chatContainer.classList.add("drag-over");
      });
      chatContainer.addEventListener("dragleave", () => {
        chatContainer.classList.remove("drag-over");
      });
      chatContainer.addEventListener("drop", (e) => {
        e.preventDefault();
        chatContainer.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) handleFileSelect(file);
      });

      function handleFileSelect(file) {
        if (file.size > FILE_SIZE_LIMIT) {
          alert("파일 크기는 5MB 이하여야 합니다.");
          fileInput.value = "";
          return;
        }
        const isImage = file.type.startsWith("image/");
        const reader = new FileReader();
        if (isImage) {
          reader.onload = (e) => {
            pendingAttachment = {
              name: file.name,
              type: file.type,
              dataUrl: e.target.result,
              isImage: true,
              isPdf: false,
            };
            showAttachmentPreview();
          };
          reader.readAsDataURL(file);
        } else if (file.type === "application/pdf") {
          reader.onload = async (e) => {
            const dataUrl = e.target.result;
            // 미리보기 먼저 표시 (추출 중 상태)
            pendingAttachment = {
              name: file.name,
              type: file.type,
              fileText: null,
              isImage: false,
              isPdf: true,
              extracting: true,
            };
            showAttachmentPreview();

            try {
              const res = await fetch("/api/extract-pdf", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ dataUrl }),
              });
              if (res.status === 401) {
                window.location.href = "/login";
                return;
              }
              const data = await res.json();
              if (data.error) {
                alert("PDF 텍스트 추출 실패: " + data.error);
                pendingAttachment = null;
                fileInput.value = "";
              } else {
                pendingAttachment.fileText = data.text;
                pendingAttachment.extracting = false;
              }
            } catch (err) {
              alert("PDF 처리 중 오류: " + err.message);
              pendingAttachment = null;
              fileInput.value = "";
            }
            showAttachmentPreview();
          };
          reader.readAsDataURL(file);
        } else {
          reader.onload = (e) => {
            pendingAttachment = {
              name: file.name,
              type: file.type,
              fileText: e.target.result,
              isImage: false,
              isPdf: false,
            };
            showAttachmentPreview();
          };
          reader.readAsText(file, "utf-8");
        }
      }

      function showAttachmentPreview() {
        attachmentPreview.innerHTML = "";
        if (!pendingAttachment) {
          attachmentPreview.style.display = "none";
          attachBtn.classList.remove("has-file");
          return;
        }
        attachmentPreview.style.display = "flex";
        attachBtn.classList.add("has-file");

        const item = document.createElement("div");
        item.className = "attachment-item";

        if (pendingAttachment.isImage) {
          const img = document.createElement("img");
          img.src = pendingAttachment.dataUrl;
          img.className = "attachment-thumb";
          item.appendChild(img);
        } else {
          const icon = document.createElement("span");
          icon.className = "attachment-file-icon";
          icon.textContent = pendingAttachment.isPdf ? "📕" : "📄";
          item.appendChild(icon);
        }

        if (pendingAttachment.extracting) {
          const spin = document.createElement("span");
          spin.className = "attachment-name";
          spin.textContent = "텍스트 추출 중…";
          spin.style.color = "#9aa0a6";
          item.appendChild(spin);
          attachmentPreview.appendChild(item);
          return;
        }

        const nameEl = document.createElement("span");
        nameEl.className = "attachment-name";
        nameEl.textContent = pendingAttachment.name;
        item.appendChild(nameEl);

        const removeBtn = document.createElement("button");
        removeBtn.className = "attachment-remove";
        removeBtn.type = "button";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", () => {
          pendingAttachment = null;
          fileInput.value = "";
          showAttachmentPreview();
        });
        item.appendChild(removeBtn);

        attachmentPreview.appendChild(item);
      }

      // ── 메시지 UI ─────────────────────────────────────────────

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // marked 초기화 (XSS 방지: sanitize는 DOMPurify 없이 최소한으로)
      marked.setOptions({
        breaks: false, // true이면 단일 \n마다 <br> 생성 → <p> 마진과 중첩돼 이중 공백 발생
        gfm: true,
      });
      marked.use({
        renderer: {
          // 외부 링크는 새 탭으로
          link({ href, text }) {
            const safeText = text ?? "";
            const safe =
              href &&
              (href.startsWith("http") ||
                href.startsWith("https") ||
                href.startsWith("/"));
            if (!safe) return escapeHtml(safeText);
            return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${safeText}</a>`;
          },
        },
      });

      function renderMarkdown(text) {
        const html = marked.parse(text);
        const div = document.createElement("div");
        div.className = "md-body";
        div.innerHTML = html;
        // 코드 블록 syntax highlight
        div
          .querySelectorAll("pre code")
          .forEach((block) => hljs.highlightElement(block));
        return div;
      }

      // content: string 또는 display content 배열( [{type,text|image_url|file_badge}] )
      function appendMessage(role, content) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "U" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        if (Array.isArray(content)) {
          content.forEach((part) => {
            if (part.type === "text" && part.text) {
              if (role === "assistant") {
                bubble.appendChild(renderMarkdown(part.text));
              } else {
                const p = document.createElement("p");
                p.className = "msg-text";
                p.textContent = part.text;
                bubble.appendChild(p);
              }
            } else if (part.type === "image_url" && part.image_url) {
              const img = document.createElement("img");
              img.src = part.image_url.url;
              img.className = "msg-image";
              img.alt = "첨부 이미지";
              bubble.appendChild(img);
            } else if (part.type === "file_badge" && part.name) {
              const badge = document.createElement("div");
              badge.style.cssText =
                "display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.18);" +
                "border-radius:8px;padding:4px 10px;font-size:13px;margin-top:4px;";
              badge.innerHTML = `<span>📎</span><span>${escapeHtml(part.name)}</span>`;
              bubble.appendChild(badge);
            }
          });
        } else {
          // 단순 문자열: assistant면 마크다운 렌더링
          if (role === "assistant") {
            bubble.appendChild(renderMarkdown(String(content)));
          } else {
            bubble.textContent = content;
          }
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function showTyping() {
        const row = document.createElement("div");
        row.className = "message-row assistant";
        row.id = "typing-row";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "AI";

        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = "<span></span><span></span><span></span>";

        row.appendChild(avatar);
        row.appendChild(indicator);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function hideTyping() {
        const row = document.getElementById("typing-row");
        if (row) row.remove();
      }

      // ── 메시지 전송 ───────────────────────────────────────────

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text && !pendingAttachment) return;
        if (pendingAttachment && pendingAttachment.extracting) {
          alert("PDF 텍스트를 추출 중입니다. 잠시 후 다시 시도하세요.");
          return;
        }

        // LLM 전송용 content (파일 전체 내용 포함)
        let apiContent;
        // UI 표시용 content (파일은 이름 배지만 표시)
        let displayContent;

        if (pendingAttachment) {
          const apiParts = [];
          const displayParts = [];
          if (text) {
            apiParts.push({ type: "text", text });
            displayParts.push({ type: "text", text });
          }

          if (pendingAttachment.isImage) {
            apiParts.push({
              type: "image_url",
              image_url: { url: pendingAttachment.dataUrl },
            });
            // 이미지는 UI에도 미리보기 표시
            displayParts.push({
              type: "image_url",
              image_url: { url: pendingAttachment.dataUrl },
            });
          } else {
            // 텍스트/PDF: LLM에는 내용 전달, UI에는 파일명 배지만 표시
            const fileBlock = `[파일: ${pendingAttachment.name}]\n${pendingAttachment.fileText}`;
            if (apiParts.length > 0) {
              apiParts[0].text = text + "\n\n" + fileBlock;
            } else {
              apiParts.push({ type: "text", text: fileBlock });
            }
            displayParts.push({
              type: "file_badge",
              name: pendingAttachment.name,
            });
          }
          apiContent = apiParts;
          displayContent = displayParts;
        } else {
          apiContent = text;
          displayContent = text;
        }

        appendMessage("user", displayContent);
        history.push({ role: "user", content: apiContent });

        inputEl.value = "";
        inputEl.style.height = "auto";
        pendingAttachment = null;
        fileInput.value = "";
        showAttachmentPreview();

        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });

          if (res.status === 401) {
            window.location.href = "/login";
            return;
          }

          if (!res.ok) {
            throw new Error(`서버 오류: ${res.status}`);
          }

          const data = await res.json();
          const reply = data.content || "응답을 받지 못했습니다.";

          history.push({ role: "assistant", content: reply });
          hideTyping();
          appendMessage("assistant", reply);
        } catch (err) {
          hideTyping();
          appendMessage("assistant", `오류가 발생했습니다: ${err.message}`);
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      // 전송 버튼 클릭
      sendBtn.addEventListener("click", sendMessage);

      // Enter 키 전송 (Shift+Enter는 줄바꿈)
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // textarea 자동 높이 조절
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });
    </script>
  </body>
</html>
